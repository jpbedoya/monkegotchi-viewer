<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MonkeGotchi GLB Viewer</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <style>
    :root {
      --bg: #0f1115;
      --panel: rgba(20, 24, 31, 0.92);
      --line: rgba(255,255,255,0.12);
      --text: #f5f7fb;
      --muted: #9eabc0;
      --accent: #4da3ff;
      --accent-2: #8a5cff;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top, #1a2030 0%, #0f1115 60%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }
    model-viewer {
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #111722 0%, #0b0e14 100%);
      --progress-bar-color: var(--accent);
      --poster-color: transparent;
    }
    .panel {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      backdrop-filter: blur(10px);
      z-index: 10;
      box-shadow: 0 10px 30px rgba(0,0,0,0.28);
    }
    .title {
      font-weight: 700;
      margin-right: 8px;
    }
    .muted {
      color: var(--muted);
      font-size: 13px;
    }
    button, select, .file-label {
      appearance: none;
      border: 1px solid var(--line);
      background: #171c26;
      color: var(--text);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover, select:hover, .file-label:hover { border-color: rgba(255,255,255,0.24); }
    button.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border: none;
    }
    .file-label input { display: none; }
    .spacer { flex: 1 1 auto; }
    .dropzone {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(10, 14, 22, 0.78);
      border: 3px dashed rgba(255,255,255,0.28);
      color: white;
      z-index: 20;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .dropzone.show { display: grid; }
    .status {
      position: absolute;
      bottom: 16px;
      left: 16px;
      max-width: min(680px, calc(100% - 32px));
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(8, 11, 18, 0.8);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      z-index: 10;
      backdrop-filter: blur(8px);
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 12px;
      color: var(--muted);
    }
    @media (max-width: 700px) {
      .panel { gap: 8px; }
      .title { width: 100%; }
      .spacer { display: none; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="panel">
      <div>
        <div class="title">MonkeGotchi GLB Viewer</div>
        <div class="muted">Orbit, zoom, drag & drop, upload, and built-in Monke samples.</div>
      </div>

      <select id="sampleSelect" title="Pick a bundled model">
        <option value="monke4607.glb">Monke4607 — Sombrero</option>
        <option value="monke1012.glb">Monke1012 — Beige Smoking + White Headset</option>
      </select>

      <button id="loadSampleBtn" class="primary">Load sample</button>
      <label class="file-label">Upload GLB<input id="fileInput" type="file" accept=".glb,.gltf,model/gltf-binary,model/gltf+json" /></label>
      <button id="toggleRotateBtn">Pause spin</button>
      <button id="resetCameraBtn">Reset camera</button>
      <div class="spacer"></div>
      <span class="pill">model-viewer 3.5.0</span>
    </div>

    <model-viewer
      id="viewer"
      src="monke4607.glb"
      camera-controls
      touch-action="pan-y"
      autoplay
      auto-rotate
      shadow-intensity="1"
      exposure="1"
      environment-image="neutral"
      camera-orbit="0deg 75deg 105%"
      min-camera-orbit="auto auto 40%"
      max-camera-orbit="auto auto 300%"
      field-of-view="30deg"
      interaction-prompt="auto"
      loading="eager"
      ar-status="not-presenting">
    </model-viewer>

    <div id="dropzone" class="dropzone">Drop GLB / GLTF here</div>
    <div id="status" class="status">Loaded <strong>Monke4607</strong>. Try the dropdown to switch to Monke1012.</div>
  </div>

  <script>
    const viewer = document.getElementById('viewer');
    const status = document.getElementById('status');
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const sampleSelect = document.getElementById('sampleSelect');
    const loadSampleBtn = document.getElementById('loadSampleBtn');
    const toggleRotateBtn = document.getElementById('toggleRotateBtn');
    const resetCameraBtn = document.getElementById('resetCameraBtn');

    let objectUrl = null;
    let rotating = true;

    const prettyNames = {
      'monke4607.glb': 'Monke4607 — Sombrero',
      'monke1012.glb': 'Monke1012 — Beige Smoking + White Headset'
    };

    function revokeIfNeeded() {
      if (objectUrl) {
        URL.revokeObjectURL(objectUrl);
        objectUrl = null;
      }
    }

    function setStatus(html) {
      status.innerHTML = html;
    }

    function loadModel(src, label, details = '') {
      viewer.src = src;
      setStatus(`Loaded <strong>${label}</strong>${details ? ` — ${details}` : ''}`);
    }

    function loadFile(file) {
      if (!file) return;
      revokeIfNeeded();
      objectUrl = URL.createObjectURL(file);
      loadModel(objectUrl, file.name, `${Math.round(file.size / 1024)} KB local file`);
    }

    function resetCamera() {
      viewer.cameraOrbit = '0deg 75deg 105%';
      viewer.jumpCameraToGoal();
    }

    loadSampleBtn.addEventListener('click', () => {
      const value = sampleSelect.value;
      loadModel(value, prettyNames[value] || value, 'bundled sample');
      resetCamera();
    });

    fileInput.addEventListener('change', (e) => {
      loadFile(e.target.files?.[0]);
      resetCamera();
    });

    toggleRotateBtn.addEventListener('click', () => {
      rotating = !rotating;
      if (rotating) {
        viewer.setAttribute('auto-rotate', '');
        toggleRotateBtn.textContent = 'Pause spin';
      } else {
        viewer.removeAttribute('auto-rotate');
        toggleRotateBtn.textContent = 'Resume spin';
      }
    });

    resetCameraBtn.addEventListener('click', resetCamera);

    ['dragenter', 'dragover'].forEach(evt => {
      window.addEventListener(evt, (e) => {
        e.preventDefault();
        dropzone.classList.add('show');
      });
    });

    ['dragleave', 'drop'].forEach(evt => {
      window.addEventListener(evt, (e) => {
        e.preventDefault();
        if (evt === 'drop') {
          const file = [...(e.dataTransfer?.files || [])].find(f => /\.(glb|gltf)$/i.test(f.name));
          if (file) {
            loadFile(file);
            resetCamera();
          }
        }
        dropzone.classList.remove('show');
      });
    });

    window.addEventListener('beforeunload', revokeIfNeeded);
  </script>
</body>
</html>
