<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>MonkeGotchi Viewer</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <style>
    :root {
      --accent: #4da3ff;
      --accent2: #8a5cff;
      --glass: rgba(12, 16, 24, 0.82);
      --line: rgba(255,255,255,0.12);
      --text: #f0f4ff;
      --muted: #8899b4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0b0e14;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* === FULL-SCREEN VIEWER === */
    model-viewer {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 50% 30%, #1a2235 0%, #0b0e14 70%);
      --progress-bar-color: var(--accent);
      --poster-color: transparent;
    }

    /* === TOP BAR === */
    #topbar {
      position: fixed;
      top: env(safe-area-inset-top, 0);
      left: 0; right: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--glass);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      z-index: 20;
    }

    #topbar .logo {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.01em;
      white-space: nowrap;
    }

    #sampleSelect {
      flex: 1;
      min-width: 0;
      appearance: none;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--line);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-overflow: ellipsis;
      overflow: hidden;
      white-space: nowrap;
    }

    #loadBtn {
      flex-shrink: 0;
      padding: 8px 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    /* === BOTTOM BAR === */
    #bottombar {
      position: fixed;
      bottom: env(safe-area-inset-bottom, 0);
      left: 0; right: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      background: var(--glass);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      z-index: 20;
    }

    .icon-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
      line-height: 1;
    }
    .icon-btn span {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    #statusText {
      flex: 1;
      font-size: 12px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 0 4px;
    }

    /* === DROP OVERLAY === */
    #dropzone {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 30;
      background: rgba(10, 14, 22, 0.85);
      border: 3px dashed rgba(255,255,255,0.3);
      place-items: center;
      font-size: 20px;
      font-weight: 700;
    }
    #dropzone.show { display: grid; }

    /* hidden upload input */
    #fileInput { display: none; }
  </style>
</head>
<body>

  <!-- Full-screen 3D viewer -->
  <model-viewer
    id="viewer"
    src="monke4607.glb"
    camera-controls
    touch-action="pan-y"
    auto-rotate
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral"
    camera-orbit="0deg 75deg 105%"
    min-camera-orbit="auto auto 40%"
    max-camera-orbit="auto auto 300%"
    field-of-view="30deg"
    loading="eager">
  </model-viewer>

  <!-- Top bar: logo + model picker -->
  <div id="topbar">
    <div class="logo">🐵</div>
    <select id="sampleSelect">
      <option value="monke4607.glb">Monke4607 — Sombrero</option>
      <option value="monke1012.glb">Monke1012 — Beige Smoking</option>
    </select>
    <button id="loadBtn">Load</button>
  </div>

  <!-- Bottom bar: actions + status -->
  <div id="bottombar">
    <button class="icon-btn" id="toggleRotateBtn">
      ⏸ <span>Spin</span>
    </button>
    <button class="icon-btn" id="resetCameraBtn">
      🎯 <span>Reset</span>
    </button>
    <label class="icon-btn">
      📂 <span>Upload</span>
      <input id="fileInput" type="file" accept=".glb,.gltf" />
    </label>
    <div id="statusText">Loaded Monke4607</div>
  </div>

  <!-- Drag-and-drop overlay -->
  <div id="dropzone">Drop GLB here</div>

  <script>
    const viewer = document.getElementById('viewer');
    const statusText = document.getElementById('statusText');
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const sampleSelect = document.getElementById('sampleSelect');
    const loadBtn = document.getElementById('loadBtn');
    const toggleRotateBtn = document.getElementById('toggleRotateBtn');
    const resetCameraBtn = document.getElementById('resetCameraBtn');

    let objectUrl = null;
    let rotating = true;

    const labels = {
      'monke4607.glb': 'Monke4607 — Sombrero',
      'monke1012.glb': 'Monke1012 — Beige Smoking'
    };

    function revokeIfNeeded() {
      if (objectUrl) { URL.revokeObjectURL(objectUrl); objectUrl = null; }
    }

    function resetCamera() {
      viewer.cameraOrbit = '0deg 75deg 105%';
      viewer.jumpCameraToGoal?.();
    }

    function loadSrc(src, label) {
      viewer.src = src;
      statusText.textContent = 'Loaded ' + label;
      resetCamera();
    }

    function loadFile(file) {
      if (!file) return;
      revokeIfNeeded();
      objectUrl = URL.createObjectURL(file);
      loadSrc(objectUrl, file.name);
    }

    loadBtn.addEventListener('click', () => {
      loadSrc(sampleSelect.value, labels[sampleSelect.value] || sampleSelect.value);
    });

    fileInput.addEventListener('change', e => loadFile(e.target.files?.[0]));

    toggleRotateBtn.addEventListener('click', () => {
      rotating = !rotating;
      rotating ? viewer.setAttribute('auto-rotate', '') : viewer.removeAttribute('auto-rotate');
      toggleRotateBtn.innerHTML = (rotating ? '⏸' : '▶️') + ' <span>Spin</span>';
    });

    resetCameraBtn.addEventListener('click', resetCamera);

    // Drag and drop
    ['dragenter','dragover'].forEach(e => window.addEventListener(e, ev => {
      ev.preventDefault(); dropzone.classList.add('show');
    }));
    ['dragleave','drop'].forEach(e => window.addEventListener(e, ev => {
      ev.preventDefault();
      if (e === 'drop') {
        const file = [...(ev.dataTransfer?.files||[])].find(f => /\.(glb|gltf)$/i.test(f.name));
        if (file) loadFile(file);
      }
      dropzone.classList.remove('show');
    }));

    window.addEventListener('beforeunload', revokeIfNeeded);
  </script>
</body>
</html>
