<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐵 MonkeGotchi GLB Viewer</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f0f;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 1rem;
      opacity: 0.8;
      letter-spacing: 0.05em;
    }

    #drop-zone {
      width: 600px;
      height: 600px;
      border: 2px dashed #444;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.2s;
      position: relative;
      overflow: hidden;
    }

    #drop-zone.drag-over {
      border-color: #9f7aea;
      background: rgba(159, 122, 234, 0.05);
    }

    #drop-zone p {
      color: #888;
      font-size: 0.95rem;
    }

    #drop-zone .icon {
      font-size: 3rem;
    }

    #file-input {
      display: none;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      border-radius: 14px;
      background: transparent;
      --progress-bar-color: #9f7aea;
    }

    #controls {
      margin-top: 1rem;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    button {
      background: #1e1e1e;
      border: 1px solid #333;
      color: #fff;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }

    button:hover {
      background: #2a2a2a;
    }

    #filename {
      color: #666;
      font-size: 0.8rem;
    }

    #upload-btn {
      border-color: #9f7aea;
      color: #9f7aea;
    }
  </style>
</head>
<body>

  <h1>🐵 MonkeGotchi GLB Viewer</h1>

  <div id="drop-zone">
    <div class="icon">🐒</div>
    <p>Loading Monke4607...</p>
    <input type="file" id="file-input" accept=".glb,.gltf" style="display:none" />
  </div>

  <div id="controls">
    <button id="upload-btn" onclick="document.getElementById('file-input').click()">📂 Load File</button>
    <button onclick="toggleAuto()">🔄 Auto-rotate</button>
    <button onclick="resetCamera()">🎯 Reset View</button>
    <span id="filename"></span>
  </div>

  <script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const filenameEl = document.getElementById('filename');
    let viewer = null;
    let autoRotate = true;

    // Auto-load the monke file
    function loadFromURL(url, name) {
      filenameEl.textContent = name;
      if (viewer) viewer.remove();
      viewer = document.createElement('model-viewer');
      viewer.setAttribute('src', url);
      viewer.setAttribute('auto-rotate', '');
      viewer.setAttribute('camera-controls', '');
      viewer.setAttribute('shadow-intensity', '1');
      viewer.setAttribute('environment-image', 'neutral');
      viewer.setAttribute('exposure', '1');
      viewer.setAttribute('alt', name);
      viewer.style.width = '100%';
      viewer.style.height = '100%';
      dropZone.innerHTML = '';
      dropZone.style.border = 'none';
      dropZone.style.cursor = 'default';
      dropZone.onclick = null;
      dropZone.appendChild(viewer);
    }

    // Load Monke4607 automatically
    loadFromURL('monke4607.glb', 'Monke4607 - Solana Sombrero');

    function loadGLB(file) {
      const url = URL.createObjectURL(file);
      filenameEl.textContent = file.name;

      // Remove existing viewer
      if (viewer) viewer.remove();

      viewer = document.createElement('model-viewer');
      viewer.setAttribute('src', url);
      viewer.setAttribute('auto-rotate', '');
      viewer.setAttribute('camera-controls', '');
      viewer.setAttribute('shadow-intensity', '1');
      viewer.setAttribute('environment-image', 'neutral');
      viewer.setAttribute('exposure', '1');
      viewer.setAttribute('alt', 'SMB 3D model');
      viewer.style.width = '100%';
      viewer.style.height = '100%';

      // Clear drop zone and add viewer
      dropZone.innerHTML = '';
      dropZone.style.border = 'none';
      dropZone.style.cursor = 'default';
      dropZone.onclick = null;
      dropZone.appendChild(viewer);
    }

    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) loadGLB(e.target.files[0]);
    });

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('drag-over');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && (file.name.endsWith('.glb') || file.name.endsWith('.gltf'))) {
        loadGLB(file);
      }
    });

    function toggleAuto() {
      if (!viewer) return;
      autoRotate = !autoRotate;
      if (autoRotate) {
        viewer.setAttribute('auto-rotate', '');
      } else {
        viewer.removeAttribute('auto-rotate');
      }
    }

    function resetCamera() {
      if (!viewer) return;
      viewer.cameraOrbit = 'auto auto auto';
      viewer.resetTurntableRotation();
    }
  </script>

</body>
</html>
